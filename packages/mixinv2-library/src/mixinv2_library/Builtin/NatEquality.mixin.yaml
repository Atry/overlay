- [NatVisitor]
- NatFactory:
    - Product:
        Equal:
          other: [Product]
          equal: [NatEquality, ~, Boolean]
      Zero:
        Equal:
          other: [Product]
          _OtherVisitors:
            - [other, Visitors]
            - ZeroVisitor:
                equal: [NatEquality, ~, BooleanFactory, "True"]
              SuccessorVisitor:
                equal: [NatEquality, ~, BooleanFactory, "False"]
              Accepted:
                equal: [NatEquality, ~, Boolean]
          equal: [_OtherVisitors, Accepted, equal]
      Successor:
        predecessor:
          Equal:
            equal: [NatEquality, ~, Boolean]
        Equal:
          other:
            - [Product]
            - predecessor: [Product]
          _recursiveEquality:
            - [Successor, ~, predecessor, Equal]
            - other: [Equal, ~, other, predecessor]
          _OtherVisitors:
            - [other, Visitors]
            - ZeroVisitor:
                equal: [NatEquality, ~, BooleanFactory, "False"]
              SuccessorVisitor:
                equal: [_recursiveEquality, equal]
              Accepted:
                equal: [NatEquality, ~, Boolean]
          equal: [_OtherVisitors, Accepted, equal]
- [BooleanData]
