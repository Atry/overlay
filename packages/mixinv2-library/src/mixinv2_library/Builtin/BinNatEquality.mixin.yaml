- [BinNatVisitor]
- [BooleanData]
- BinNatFactory:
    - Product:
        Equal:
          other: [Product]
          equal: [BinNatEquality, ~, Boolean]
      Zero:
        Equal:
          other: [Product]
          _OtherVisitors:
            - [other, Visitors]
            - ZeroVisitor:
                equal: [BinNatEquality, ~, BooleanFactory, "True"]
              EvenVisitor:
                equal: [BinNatEquality, ~, BooleanFactory, "False"]
              OddVisitor:
                equal: [BinNatEquality, ~, BooleanFactory, "False"]
              Accepted:
                equal: [BinNatEquality, ~, Boolean]
          equal: [_OtherVisitors, Accepted, equal]
      Even:
        half:
          Equal:
            equal: [BinNatEquality, ~, Boolean]
        Equal:
          other:
            - [Product]
            - half: [Product]
          _recursiveEquality:
            - [Even, ~, half, Equal]
            - other: [Equal, ~, other, half]
          _OtherVisitors:
            - [other, Visitors]
            - ZeroVisitor:
                equal: [BinNatEquality, ~, BooleanFactory, "False"]
              EvenVisitor:
                equal: [_recursiveEquality, equal]
              OddVisitor:
                equal: [BinNatEquality, ~, BooleanFactory, "False"]
              Accepted:
                equal: [BinNatEquality, ~, Boolean]
          equal: [_OtherVisitors, Accepted, equal]
      Odd:
        halfOfPredecessor:
          Equal:
            equal: [BinNatEquality, ~, Boolean]
        Equal:
          other:
            - [Product]
            - halfOfPredecessor: [Product]
          _recursiveEquality:
            - [Odd, ~, halfOfPredecessor, Equal]
            - other: [Equal, ~, other, halfOfPredecessor]
          _OtherVisitors:
            - [other, Visitors]
            - ZeroVisitor:
                equal: [BinNatEquality, ~, BooleanFactory, "False"]
              EvenVisitor:
                equal: [BinNatEquality, ~, BooleanFactory, "False"]
              OddVisitor:
                equal: [_recursiveEquality, equal]
              Accepted:
                equal: [BinNatEquality, ~, Boolean]
          equal: [_OtherVisitors, Accepted, equal]
