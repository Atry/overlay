- [BinNatVisitor]
- BinNatFactory:
    Product:
      Decrement:
        decreased: [Product]
    Zero:
      Decrement:
        decreased: [Zero]
    Even:
      half:
        Decrement:
          decreased: [Product]
      Decrement:
        _HalfVisitors:
          - [Even, ~, half, Visitors]
          - ZeroVisitor:
              decreased: [Zero]
            EvenVisitor:
              decreased:
                - [Odd]
                - halfOfPredecessor: [Even, ~, half, Decrement, decreased]
            OddVisitor:
              decreased:
                - [Odd]
                - halfOfPredecessor: [Even, ~, half, Decrement, decreased]
            Accepted:
              decreased: [Product]
        decreased: [_HalfVisitors, Accepted, decreased]
    Odd:
      Decrement:
        _HalfVisitors:
          - [Odd, ~, halfOfPredecessor, Visitors]
          - ZeroVisitor:
              decreased: [Zero]
            EvenVisitor:
              decreased:
                - [Even]
                - half: [Odd, ~, halfOfPredecessor]
            OddVisitor:
              decreased:
                - [Even]
                - half: [Odd, ~, halfOfPredecessor]
            Accepted:
              decreased: [Product]
        decreased: [_HalfVisitors, Accepted, decreased]
