- [BinNatData]
- BinNatFactory:
    Product:
      Visitors:
        Accepted: []
    Zero:
      Visitors:
        - ZeroVisitor: []
          Accepted: [ZeroVisitor]
    Even:
      half: [Product]
      Visitors:
        - EvenVisitor: []
          Accepted: [EvenVisitor]
    Odd:
      halfOfPredecessor: [Product]
      Visitors:
        - OddVisitor: []
          Accepted: [OddVisitor]
